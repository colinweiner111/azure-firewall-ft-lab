    <ellipse cx="20" cy="0" rx="17" ry="12" fill="none" stroke="#4D7FAA" stroke-width="1.5"/>
    <text x="0" y="14" font-size="10" font-weight="600" text-anchor="middle" fill="#6AAAD0">Internet</text>
