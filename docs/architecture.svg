  <text x="825" y="264" font-size="7" text-anchor="middle" fill="#888888">both spoke subnets</text>
  <line x1="728" y1="272" x2="922" y2="272" stroke="#E91E8C" stroke-width="0.6" opacity="0.4"/>
  <text x="825" y="284" font-size="7.5" text-anchor="middle" fill="#CCCCCC">0.0.0.0/0  →  10.0.0.4</text>

  <!-- ═══ SPOKE 02 (720, 322, 210, 148) ═══ -->
  <rect x="720" y="322" width="210" height="148" rx="3" fill="none" stroke="#E91E8C" stroke-width="2"/>
  <text x="825" y="316" font-size="11" font-weight="700" text-anchor="middle" fill="#F0F0F0">Spoke 02</text>
  <g transform="translate(825,383)">
    <rect x="-16" y="-13" width="32" height="20" rx="2" fill="none" stroke="#33DD55" stroke-width="1.8"/>
    <rect x="-12" y="-9" width="24" height="13" fill="#33DD55" opacity="0.18"/>
    <rect x="-18" y="7" width="36" height="5" rx="1" fill="#33DD55" opacity="0.65"/>
