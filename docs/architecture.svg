  <rect x="720" y="62" width="210" height="148" rx="3" fill="none" stroke="#E91E8C" stroke-width="2"/>
  <text x="825" y="56" font-size="11" font-weight="700" text-anchor="middle" fill="#F0F0F0">Spoke 01</text>
  <g transform="translate(825,123)">
    <rect x="-16" y="-13" width="32" height="20" rx="2" fill="none" stroke="#33DD55" stroke-width="1.8"/>
    <rect x="-12" y="-9" width="24" height="13" fill="#33DD55" opacity="0.18"/>
    <rect x="-18" y="7" width="36" height="5" rx="1" fill="#33DD55" opacity="0.65"/>
