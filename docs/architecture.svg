  <text x="117" y="199" font-size="11" font-weight="700" text-anchor="middle" fill="#F0F0F0">On-prem</text>

  <!-- FRR VM laptop -->
  <g transform="translate(70,262)">
    <rect x="-16" y="-13" width="32" height="20" rx="2" fill="none" stroke="#33DD55" stroke-width="1.8"/>
    <rect x="-12" y="-9" width="24" height="13" fill="#33DD55" opacity="0.18"/>
    <rect x="-18" y="7" width="36" height="5" rx="1" fill="#33DD55" opacity="0.65"/>
