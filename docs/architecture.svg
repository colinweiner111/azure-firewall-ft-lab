    <rect x="-3"  y="-14" width="11" height="8" rx="1" fill="#CC2222"/>
    <rect x="10"  y="-14" width="8"  height="8" rx="1" fill="#CC2222"/>
    <rect x="-20" y="-4"  width="11" height="8" rx="1" fill="#CC2222"/>
    <rect x="-7"  y="-4"  width="11" height="8" rx="1" fill="#CC2222"/>
    <rect x="6"   y="-4"  width="11" height="8" rx="1" fill="#CC2222"/>
    <rect x="-16" y="6"   width="11" height="8" rx="1" fill="#CC2222"/>
