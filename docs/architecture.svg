  <text x="825" y="460" font-size="8.5" text-anchor="middle" fill="#888888">10.2.0.0/24</text>

  <!-- ═══ CONNECTIONS ═══ -->

  <!-- Internet ↕ Hub AZFW (dashed) -->
  <line x1="478" y1="79" x2="400" y2="148"
        stroke="#BBBBBB" stroke-width="1.3" stroke-dasharray="5,3"
        marker-end="url(#aw)" marker-start="url(#aw-r)"/>

  <!-- On-prem ↔ Hub S2S -->
  <line x1="215" y1="265" x2="312" y2="255"
        stroke="#CCCCCC" stroke-width="1.5"
        marker-end="url(#aw)" marker-start="url(#aw-r)"/>
  <text x="263" y="249" font-size="9" text-anchor="middle" fill="#DDDDDD">S2S/ER</text>
  <text x="263" y="260" font-size="7.5" text-anchor="middle" fill="#888888">BGP 0.0.0.0/0</text>

  <!-- Hub right (622) → junction (680, 242) → spine y=136 to y=396 -->
  <line x1="622" y1="242" x2="680" y2="242" stroke="#CCCCCC" stroke-width="1.2"/>
  <line x1="680" y1="136" x2="680" y2="396" stroke="#CCCCCC" stroke-width="1.2"/>

  <!-- Peering node → Spoke 01 -->
  <circle cx="680" cy="136" r="7" fill="#E91E8C" opacity="0.18" stroke="#E91E8C" stroke-width="1.5"/>
  <circle cx="680" cy="136" r="3" fill="#E91E8C" opacity="0.65"/>
  <line x1="687" y1="136" x2="720" y2="136" stroke="#CCCCCC" stroke-width="1.2" marker-end="url(#aw)"/>
  <text x="700" y="126" font-size="8" text-anchor="middle" fill="#DDDDDD">Peering</text>

  <!-- Peering node → Spoke 02 -->
  <circle cx="680" cy="396" r="7" fill="#E91E8C" opacity="0.18" stroke="#E91E8C" stroke-width="1.5"/>
  <circle cx="680" cy="396" r="3" fill="#E91E8C" opacity="0.65"/>
  <line x1="687" y1="396" x2="720" y2="396" stroke="#CCCCCC" stroke-width="1.2" marker-end="url(#aw)"/>
  <text x="700" y="412" font-size="8" text-anchor="middle" fill="#DDDDDD">Peering</text>

  <!-- rt-corp-spokes connectors -->
  <line x1="825" y1="210" x2="825" y2="236" stroke="#E91E8C" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <line x1="825" y1="296" x2="825" y2="322" stroke="#E91E8C" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>

</svg>
