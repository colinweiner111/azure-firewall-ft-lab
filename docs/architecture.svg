  <text x="70" y="286" font-size="8.5" text-anchor="middle" fill="#CCCCCC">10.100.0.10</text>
  <text x="70" y="297" font-size="7.5" text-anchor="middle" fill="#888888">FRR VM</text>

  <!-- strongSwan padlock (orange) -->
  <g transform="translate(158,259)">
    <path d="M-13,2 a13,13 0 0,1 26,0" fill="none" stroke="#E87722" stroke-width="2.2" stroke-linecap="round"/>
    <rect x="-15" y="2" width="30" height="21" rx="3" fill="none" stroke="#E87722" stroke-width="1.8"/>
