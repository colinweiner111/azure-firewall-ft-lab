  <rect width="1000" height="555" fill="#16162A"/>
  <rect width="1000" height="555" fill="url(#dots)"/>

  <text x="500" y="22" font-size="13" font-weight="600" text-anchor="middle" fill="#D0D0E8">Azure Firewall Forced Tunneling Lab</text>

  <!-- Internet cloud -->
  <g transform="translate(500,63)">
