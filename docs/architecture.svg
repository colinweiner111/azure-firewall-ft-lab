  <text x="383" y="273" font-size="7" text-anchor="middle" fill="#CC6644">rt-corp-fw-data</text>
  <text x="383" y="283" font-size="6.5" text-anchor="middle" fill="#777777">+Mgmt 10.0.0.64/26 · rt-corp-fw-mgmt</text>

